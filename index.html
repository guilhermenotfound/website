<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>neapolt's portfolio</title>
    <link rel="icon" href="icon.jpg" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="name">Neapolt</h1>
            <p class="title">Data Analysis Student</p>
            <p class="bio">
                Hello! I'm Guilherme but known online as neapolt. I am a student currently focused on learning and building a strong foundation in Data analysis.
            </p>
        </header>

        <section id="writing">
            <div class="section-header">Small Blog</div>
            <div class="blog-list">
                <div class="blog-item" onclick="openBlog(0)">
                    <div class="blog-header">
                        <div class="blog-title-group">
                            <span class="blog-title">Blog Testing</span>
                            <span class="blog-meta">Testing • Apr 11, 2026</span>
                        </div>
                        <span class="blog-arrow">→</span>
                    </div>
                </div>

            </div>
        </section>

    <!-- Blog Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div class="modal-title-group">
                    <div class="modal-category" id="modalCategory">Category</div>
                    <h2 class="modal-title" id="modalTitle">Title</h2>
                    <div class="modal-meta" id="modalMeta">Date • Reading time</div>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                Content
            </div>
        </div>
    </div>

    <footer>
            <span>© <span id="year"></span> neapolt.com</span>
            <!--<div class="footer-links">
                <a href="https://github.com/guilhermenotfound" target="_blank">GitHub</a>
                <a href="#" target="_blank"></a>
                <a href="#" target="_blank"></a>
            </div> -->
        </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();

        const blogPosts = [
            {
                category: "Testing",
                title: "Test Content Placeholder",
                meta: "April 11, 2026 • 1 minute read",
                content: `
                    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
    
                    <h3>Section Title</h3>
                    <p>Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>
    
                    <div class="modal-highlight">
                    <p>"Lorem ipsum dolor sit amet, consectetur adipiscing elit."</p>
                    </div>
    
                    <h3>Another Section</h3>
                    <ul>
                        <li>Lorem ipsum dolor sit amet</li>
                        <li>Consectetur adipiscing elit</li>
                        <li>Sed do eiusmod tempor</li>
                        <li>Incididunt ut labore</li>
                    </ul>
    
                   <p>Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.</p>
                   `
            }
        ];

        function openBlog(index) {
            const post = blogPosts[index];
            document.getElementById('modalCategory').textContent = post.category;
            document.getElementById('modalTitle').textContent = post.title;
            document.getElementById('modalMeta').textContent = post.meta;
            document.getElementById('modalBody').innerHTML = post.content;
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event) {
            if (!event || event.target.id === 'modalOverlay' || event.target.classList.contains('modal-close')) {
                document.getElementById('modalOverlay').classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
